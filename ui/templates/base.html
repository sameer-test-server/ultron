<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ultron Analyst{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fonts/fonts.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap-icons/bootstrap-icons.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">
    <a class="skip-link" href="#mainContent">Skip to main content</a>
    <header class="navbar navbar-expand-lg sticky-top">
        <nav class="container-fluid" aria-label="Main navigation">
            <a class="navbar-brand p-0 me-0 me-lg-2" href="{{ url_for('index') }}" aria-label="Ultron">
                <h3 class="logo mb-0"><i class="bi bi-cpu-fill"></i> Ultron</h3>
            </a>
            <div class="top-links ms-3">
                <a class="nav-chip {% if request.endpoint == 'index' %}is-active{% endif %}" href="{{ url_for('index') }}">Dashboard</a>
                <a class="nav-chip {% if request.endpoint == 'ultron_calculator' %}is-active{% endif %}" href="{{ url_for('ultron_calculator') }}">Ultron Calculator</a>
                <a class="nav-chip {% if request.endpoint == 'watchlist' %}is-active{% endif %}" href="{{ url_for('watchlist') }}">Watchlist</a>
            </div>
            <div class="ms-auto">
                <span class="status-pill me-2">Local Engine</span>
                <span class="navbar-text fw-bold" id="liveClock">--:--:--</span>
            </div>
        </nav>
    </header>

    <main id="mainContent" class="container-fluid flex-grow-1 my-4 main-container" tabindex="-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="py-3 mt-auto text-center">
        <p class="text-body-secondary small mb-0">Ultron is a local analysis system. This is not a trading platform.</p>
    </footer>

    <script src="{{ url_for('static', filename='vendor/bootstrap/bootstrap.bundle.min.js') }}"></script>
    <script>
        (function () {
            const clockEl = document.getElementById('liveClock');
            if (clockEl) {
                const renderClock = () => {
                    const now = new Date();
                    clockEl.textContent = now.toLocaleTimeString([], {
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        hour12: false
                    });
                };
                renderClock();
                setInterval(renderClock, 1000);
            }
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
